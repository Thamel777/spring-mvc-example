spring:
  application:
    name: example-demo

  # H2 in-memory database
  datasource:
    url: jdbc:h2:mem:demodb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    open-in-view: false

  # H2 web console -> http://localhost:8080/h2-console
  h2:
    console:
      enabled: true
      path: /h2-console

  # JSP View Resolver — equivalent to spring-servlet.xml InternalResourceViewResolver
  mvc:
    view:
      prefix: /WEB-INF/views/
      suffix: .jsp
